<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnoxiaOS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <link rel="stylesheet" href="os.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white;
        }
        canvas { display: block; }

        #ui-overlay {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
        }
        .top-left-meta {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-start;
        }
        #enter-btn {
            padding: 12px 28px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #enter-btn:hover { background: white; color: black; }
        .credits {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.6;
            opacity: 0.7;
        }
        .credits p { margin: 0; }
        .credits a { color: white; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.3); }
        .credits a:hover { border-bottom-color: white; }
        #info-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            padding: 5px 15px;
            font-size: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #info-btn:hover { border-color: white; color: white; }
        #info-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        .modal-hidden { opacity: 0; pointer-events: none; }
        .modal-content {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            background: black;
            text-align: left;
        }
        .modal-content h2 { margin: 0 0 20px 0; letter-spacing: 4px; font-weight: normal; }
        #close-info {
            margin-top: 20px;
            background: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }
        #transition-overlay {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
        }
        #crt-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 400;
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="monitor-canvas"></canvas>

    <div id="ui-overlay">
        <div class="top-left-meta">
            <button id="enter-btn">ENTER EXPERIENCE</button>
            <div class="credits">
                <p>Made by <strong>Ramsey Knox</strong></p>
                <p>CRT Model by <a href="https://sketchfab.com/3d-models/rm-c-series-computer-read-desc-739bcfabdd244375b37010701d43b86d" target="_blank">Charlie Chapelton</a></p>
            </div>
            <button id="info-btn">INFO</button>
        </div>
    </div>

    <div id="info-modal" class="modal-hidden">
        <div class="modal-content">
            <h2>KnoxiaOS</h2>
            <p>An interactive digital archive of Ramsey Knox's music.</p>
            <p>Click Enter Experience to boot KnoxiaOS.</p>
            <p>To shut down, open the Start menu and click Turn Off Computer.</p>
            <p>Thanks to Charlie Chapelton for the CRT 3D model.</p>
            <p>With love,</p>
            <p>Knox.</p>
            <button id="close-info">RETURN</button>
        </div>
    </div>

    <div id="transition-overlay"></div>
    <canvas id="crt-canvas"></canvas>

    <!-- OS Layer — XP structure, all built by os.js -->
    <div id="os-layer">
        <div id="desktop"></div>

        <!-- Start menu — built by os.js -->
        <div id="start-menu"></div>

        <!-- Taskbar — built by os.js -->
        <div id="taskbar"></div>

        <!-- Hidden legacy stubs so os.js refs don't break -->
        <div id="menubar"         style="display:none;"></div>
        <div id="app-menu"        style="display:none;"></div>
        <div id="dock-container"  style="display:none;"><div id="dock"></div></div>
        <div id="taskbar-windows" style="display:none;"></div>
        <div id="system-tray"     style="display:none;"></div>
        <div id="clock"           style="display:none;"></div>
    </div>

    <script src="orbit.js"></script>
    <script src="os.js"></script>
    <script type="module" src="main.js"></script>

</body>
</html>
